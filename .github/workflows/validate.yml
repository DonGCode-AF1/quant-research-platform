name: validate
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { version: "0.11.7" }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: uv sync --all-extras
      - run: npm ci --prefix apps/web
      - run: uv run ruff check .
      - run: uv run pytest
      - run: npm test --prefix apps/web
      - run: npm run build --prefix apps/web
      - run: quarto render projects/classroom-presentation --to revealjs
      - run: uv run python scripts/verify_artifacts.py

